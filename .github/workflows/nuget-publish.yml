name: Publish to NuGet
on:
  push:
    tags:
      - 'v*'
jobs:
  publish:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
    - name: Extract version
      run: echo "VERSION=$($env:GITHUB_REF -replace 'refs/tags/v','')" >> $env:GITHUB_ENV
      shell: pwsh
    - name: Restore
      run: dotnet restore
    - name: Build
      # AutoCodeGeneration=false omite el task de RazorGenerator en CI.
      # Los archivos .generated.cs deben estar commitados en el repo.
      run: dotnet build --configuration Release --no-restore /p:AutoCodeGeneration=false
    - name: Pack Common
      run: dotnet pack ./Hangfire.Community.JobsLauncher.Common/Hangfire.Community.JobsLauncher.Common.csproj --configuration Release --no-build --output ./nupkg /p:PackageVersion=${{ env.VERSION }}
    - name: Pack Dashboard
      run: dotnet pack ./Hangfire.Community.JobsLauncher.Dashboard/Hangfire.Community.JobsLauncher.Dashboard.csproj --configuration Release --no-build --output ./nupkg /p:PackageVersion=${{ env.VERSION }} /p:AutoCodeGeneration=false
    - name: Validate packages
      run: |
        $files = Get-ChildItem ./nupkg/*.nupkg
        if ($files.Count -eq 0) { Write-Error "No packages generated"; exit 1 }
      shell: pwsh
    - name: Publish
      run: dotnet nuget push ./nupkg/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate