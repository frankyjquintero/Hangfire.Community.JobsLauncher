name: Publish to NuGet

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Extract version
      run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV

    - name: Restore
      run: dotnet restore

    - name: Build
      run: dotnet build --configuration Release --no-restore

    - name: Pack Common
      run: dotnet pack ./Hangfire.Community.JobsLauncher.Common/Hangfire.Community.JobsLauncher.Common.csproj --configuration Release --no-build --output ./nupkg /p:PackageVersion=${{ env.VERSION }}

    - name: Pack Dashboard
      run: dotnet pack ./Hangfire.Community.JobsLauncher.Dashboard/Hangfire.Community.JobsLauncher.Dashboard.csproj --configuration Release --no-build --output ./nupkg /p:PackageVersion=${{ env.VERSION }}

    - name: Validate packages
      run: |
        ls ./nupkg/*.nupkg 1> /dev/null 2>&1 || (echo "No packages generated" && exit 1)

    - name: Publish
      run: dotnet nuget push ./nupkg/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate